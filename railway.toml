# سرویس Web — دامنه عمومی (مثلاً reeldrive.up.railway.app)
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh scripts/start_production.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Persistent DB: add PostgreSQL in Railway dashboard (recommended).
# Or attach a Volume with mount path /app/data (see docs/RAILWAY_DB_FA.md).
