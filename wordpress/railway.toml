# Railway config for the WordPress service.
# Root Directory for this service is set to "wordpress" in Railway settings.
# The Dockerfile in this directory handles everything — no custom start command
# is needed; the image's default entrypoint (docker-entrypoint.sh + apache2-foreground)
# is used as-is.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Explicitly empty startCommand — overrides any value set in the Railway
# dashboard and defers to the Dockerfile ENTRYPOINT/CMD
# (docker-entrypoint.sh + apache2-foreground).
# The port fix (Listen 80 → Listen 8080) is already baked into the image
# by the RUN sed in the Dockerfile; running it again at startup would
# corrupt ports.conf ("Listen 80808080").
startCommand = ""
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
